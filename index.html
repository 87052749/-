<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界和平！</title>
    <link rel="shortcut icon" href="favicon.ico">
    <style>
        :root {
            --primary: #2478e0;
            --primary-light: #74b3ff;
            --primary-bg: #eef6ff;
            --holiday-red: #d82020;
            --festival-orange: #e66000;
            --card-bg: rgba(255, 255, 255, 0.96);
            --shadow-sm: 0 2px 12px rgba(36, 120, 224, 0.08);
            --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.18);
            --shadow-glow: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius: 14px;
            --radius-sm: 8px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.22s cubic-bezier(0.2, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(#e8f4ff, #fcf8ff);
            background-image: url("bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            gap: 22px;
            padding: 20px 12px;
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.65);
            z-index: -1;
            pointer-events: none;
        }

        /* ========== 标题区域 ========== */
        .title-wrap {
            opacity: 0;
            transform: scale(0.8);
            animation: textShow 2s ease-out forwards;
        }
        .title-text {
            color: #000000;
            font-weight: bold;
            font-size: clamp(3rem, 10vw, 6rem);
            line-height: 1.4;
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.9);
            animation: float 4s ease-in-out infinite alternate;
        }
        .peace-text {
            animation-delay: 0.6s;
        }
        @keyframes textShow {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes float {
            from {
                transform: translateY(-6px);
            }
            to {
                transform: translateY(6px);
            }
        }

        /* ========== 时钟 ========== */
        .time-box {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: #000;
            letter-spacing: 2px;
            text-shadow: 0 1px 6px rgba(255, 255, 255, 0.9);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        /* ========== 日历卡片 ========== */
        .calendar-box {
            width: min(76vw, 440px);
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 18px 16px 16px;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .calendar-box:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }
        @media (max-width: 420px) {
            .calendar-box {
                width: 94vw;
                padding: 14px 10px 12px;
                border-radius: 12px;
            }
        }

        /* ========== 日历头部 ========== */
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 6px;
            flex-wrap: nowrap;
        }
        .calendar-header button {
            border: 1px solid #ddd;
            background: #fff;
            padding: 5px 13px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition-fast);
            white-space: nowrap;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .calendar-header button:hover {
            background-color: #f0f6ff;
            border-color: #94bfff;
        }
        .calendar-header button:active {
            transform: scale(0.92);
        }
        .btn-today {
            font-weight: 500;
            color: var(--primary);
            border-color: #c8ddfb !important;
            background: #fafcff !important;
            letter-spacing: 1px;
            font-size: 13px !important;
            padding: 5px 10px !important;
        }
        .btn-today:hover {
            background: #e8f0ff !important;
            border-color: var(--primary-light) !important;
            color: #1860c7 !important;
        }
        @media (max-width: 380px) {
            .btn-today {
                font-size: 11px !important;
                padding: 4px 7px !important;
                letter-spacing: 0;
            }
            .calendar-header button {
                padding: 4px 9px;
                font-size: 12px;
            }
        }

        /* ========== 年月标题 ========== */
        .ym-text {
            font-size: 19px;
            font-weight: bold;
            position: relative;
            cursor: default;
            user-select: none;
            text-align: center;
            flex-shrink: 0;
            padding: 4px 2px;
        }
        .year-click,
        .month-click {
            color: #2478e0;
            text-decoration: underline dotted 2px #74b3ff;
            padding: 2px 5px;
            transition: color 0.2s;
            cursor: pointer;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        .year-click:hover,
        .month-click:hover {
            color: #0f5fc4;
            background: rgba(36, 120, 224, 0.06);
        }
        .year-click:active,
        .month-click:active {
            background: rgba(36, 120, 224, 0.14);
        }

        /* ========== 下拉选择面板 ========== */
        .select-panel {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) scale(0.92);
            background: #ffffff;
            border-radius: 12px;
            box-shadow: var(--shadow-sm), var(--shadow-glow);
            padding: 10px;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-smooth);
            border: none;
            pointer-events: none;
            max-height: 280px;
            overflow-y: auto;
            overscroll-behavior: contain;
        }
        .select-panel::before {
            content: "";
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid #fff;
            filter: drop-shadow(0 -2px 2px rgba(0, 0, 0, 0.05));
        }
        .select-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }
        .year-panel {
            width: 170px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        .month-panel {
            width: 210px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        @media (max-width: 420px) {
            .year-panel {
                width: 148px;
                gap: 4px;
            }
            .month-panel {
                width: 180px;
                gap: 4px;
            }
            .select-panel {
                padding: 8px;
                border-radius: 10px;
            }
        }
        .panel-item {
            padding: 7px 0;
            text-align: center;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            transition: all var(--transition-fast);
            background: #f8fbff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .panel-item:hover {
            background: linear-gradient(135deg, #e0edff, #d0e4ff);
            color: #1860c7;
            transform: translateY(-1px);
        }
        .panel-item:active {
            transform: scale(0.94);
        }
        .panel-item.active {
            background: linear-gradient(135deg, #2478e0, #368cf0);
            color: #ffffff;
            box-shadow: 0 2px 6px rgba(36, 120, 224, 0.3);
            font-weight: 600;
        }
        @media (max-width: 420px) {
            .panel-item {
                font-size: 12px;
                padding: 5px 0;
                border-radius: 6px;
            }
        }

        /* ========== 星期行 ========== */
        .week-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 6px;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }
        .week-item {
            text-align: center;
            font-size: 13px;
            padding: 5px 0;
            font-weight: 600;
            color: #444;
            letter-spacing: 0.5px;
        }
        .week-item:last-child {
            color: #c41818;
        }
        @media (max-width: 380px) {
            .week-item {
                font-size: 11px;
                padding: 3px 0;
            }
        }

        /* ========== 日期网格 ========== */
        .day-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0.3;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .day-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            padding: 2px 1px;
            transition: background 0.2s ease, transform 0.2s ease;
            cursor: default;
            position: relative;
            min-width: 0;
        }
        .day-cell.other-month {
            color: #bbb;
            pointer-events: none;
        }
        .day-cell.other-month .lunar {
            color: #ccc;
        }
        .day-cell:not(.other-month):hover {
            background-color: #eef6ff;
            transform: scale(1.06);
            z-index: 2;
        }
        .day-cell:not(.other-month):active {
            transform: scale(0.95);
            background-color: #dceaff;
        }

        /* 今天标记 */
        .day-cell.today {
            border: 2.5px solid #2478e0;
            animation: breath 2.8s ease-in-out infinite alternate;
            background: rgba(36, 120, 224, 0.04);
        }
        @keyframes breath {
            from {
                box-shadow: 0 0 4px #74b3ff, inset 0 0 4px rgba(36, 120, 224, 0.04);
            }
            to {
                box-shadow: 0 0 16px #4096ff, inset 0 0 10px rgba(36, 120, 224, 0.1);
            }
        }
        .day-cell.today .num {
            font-weight: 800;
            color: #1860c7;
        }

        /* 法定节假日 */
        .day-cell.holiday {
            background-color: #fff4f4;
        }
        .day-cell.holiday .num {
            color: #d82020;
            font-weight: bold;
        }
        .day-cell.holiday:hover {
            background-color: #ffe8e8 !important;
        }
        .holiday-name {
            font-size: 9px;
            color: #c41818;
            font-weight: bold;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* 纪念日/节气 */
        .day-cell.festival .num {
            color: #e66000;
            font-weight: 500;
        }
        .day-cell.festival {
            background-color: #fffaf5;
        }
        .day-cell.festival:hover {
            background-color: #fff2e0 !important;
        }

        /* 和平主题特殊标记 */
        .day-cell.peace-day {
            background-color: #f0f7ff;
            position: relative;
        }
        .day-cell.peace-day::after {
            content: "🕊";
            position: absolute;
            top: 1px;
            right: 2px;
            font-size: 8px;
            line-height: 1;
            opacity: 0.7;
            pointer-events: none;
        }
        @media (max-width: 380px) {
            .day-cell.peace-day::after {
                font-size: 6px;
                top: 0;
                right: 1px;
            }
        }

        .day-cell .num {
            font-size: clamp(13px, 2vw, 17px);
            line-height: 1.1;
            font-weight: 500;
        }
        .day-cell .lunar {
            font-size: 9px;
            margin-top: 1px;
            color: #555;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .day-cell.other-month .lunar {
            color: #ccc;
        }
        @media (max-width: 380px) {
            .day-cell .num {
                font-size: 12px;
            }
            .day-cell .lunar {
                font-size: 7px;
            }
            .holiday-name {
                font-size: 7px;
            }
        }

        /* ========== 响应式微调 ========== */
        @media (max-width: 360px) {
            .calendar-box {
                padding: 10px 6px 10px;
                border-radius: 10px;
            }
            .calendar-header {
                margin-bottom: 10px;
                gap: 3px;
            }
            .ym-text {
                font-size: 16px;
            }
            .day-grid {
                gap: 2px;
            }
            .day-cell {
                border-radius: 5px;
                padding: 1px;
            }
            .day-cell .num {
                font-size: 11px;
            }
            .day-cell .lunar {
                font-size: 7px;
            }
            .holiday-name {
                font-size: 6px;
            }
            .week-item {
                font-size: 10px;
            }
        }
    </style>
</head>

                    20: "十三", 21: "十四", 22: "十五", 23: "十六", 24: "十七", 25: "十八", 26: "十九", 27: "二十", 28: "廿一",
                    29: "廿二", 30: "廿三", 31: "廿四" },
                11: { 1: "廿五", 2: "廿六", 3: "廿七", 4: "廿八", 5: "廿九", 6: "十月", 7: "初二", 8: "初三", 9: "初四", 10: "初五",
                    11: "初六", 12: "初七", 13: "初八", 14: "初九", 15: "初十", 16: "十一", 17: "十二", 18: "十三", 19: "十四",
                    20: "十五", 21: "十六", 22: "十七", 23: "十八", 24: "十九", 25: "二十", 26: "廿一", 27: "廿二", 28: "廿三",
                    29: "廿四", 30: "廿五" },
                12: { 1: "廿六", 2: "廿七", 3: "廿八", 4: "廿九", 5: "冬月", 6: "初二", 7: "初三", 8: "初四", 9: "初五", 10: "初六",
                    11: "初七", 12: "初八", 13: "初九", 14: "初十", 15: "十一", 16: "十二", 17: "十三", 18: "十四", 19: "十五",
                    20: "十六", 21: "十七", 22: "十八", 23: "十九", 24: "二十", 25: "廿一", 26: "廿二", 27: "廿三", 28: "廿四",
                    29: "廿五", 30: "廿六", 31: "廿七" },
            };

            // ============ 状态 ============
            const today = new Date();
            const todayYear = today.getFullYear();
            const todayMonth = today.getMonth() + 1;
            const todayDay = today.getDate();
            let currentShowYear = todayYear;
            let currentShowMonth = todayMonth;

            // ============ 获取农历文本 ============
            function getSimpleLunar(y, m, d) {
                if (y === 2026 && lunar2026[m] && lunar2026[m][d]) {
                    return lunar2026[m][d];
                }
                // 非2026年：不显示农历（避免不准确的数据误导用户）
                return "";
            }

            // ============ 检测节日名与农历文本是否重复 ============
            function isDuplicateName(lunarTxt, holidayName) {
                if (!lunarTxt || !holidayName) return false;
                if (lunarTxt === holidayName) return true;
                if (lunarTxt.includes(holidayName) || holidayName.includes(lunarTxt)) return true;
                // 特殊映射："国庆节" vs "国庆"
                if (lunarTxt === "国庆节" && holidayName === "国庆") return true;
                if (lunarTxt === "元旦" && holidayName === "元旦") return true;
                return false;
            }

            // ============ 创建日期单元格 ============
            function createDayCell(num, holidayName, lunarTxt, isOtherMonth, isTodayFlag, isHoliday, isFestival,
                isPeaceDay) {
                const div = document.createElement("div");
                div.className = "day-cell";
                if (isOtherMonth) div.classList.add("other-month");
                if (isTodayFlag) div.classList.add("today");
                if (isHoliday && !isOtherMonth) div.classList.add("holiday");
                if (isFestival && !isOtherMonth && !isHoliday) div.classList.add("festival");
                if (isPeaceDay && !isOtherMonth) div.classList.add("peace-day");

                let innerHtml = `<span class="num">${num}</span>`;

                // 如果lunarTxt与holidayName重复，清空lunarTxt避免重复显示
                let displayLunar = lunarTxt;
                if (isHoliday && isDuplicateName(lunarTxt, holidayName)) {
                    displayLunar = "";
                }

                if (isHoliday && holidayName) {
                    innerHtml += `<span class="holiday-name">${holidayName}</span>`;
                }
                if (displayLunar) {
                    innerHtml += `<span class="lunar">${displayLunar}</span>`;
                } else if (!isHoliday && !isOtherMonth && !lunarTxt && currentShowYear !== 2026) {
                    // 非2026年显示小点占位
                    innerHtml += `<span class="lunar" style="color:#ccc;">·</span>`;
                } else if (!displayLunar && !isHoliday && !isOtherMonth && lunarTxt === "") {
                    // 占位保持高度一致
                    innerHtml += `<span class="lunar" style="visibility:hidden;">·</span>`;
                }

                div.innerHTML = innerHtml;
                return div;
            }

            // ============ 更新年月标题 ============
            function updateYMTitle() {
                yearText.textContent = currentShowYear;
                monthText.textContent = currentShowMonth;
            }

            // ============ 渲染年份选择面板 ============
            function renderYearPanel() {
                yearPanel.innerHTML = "";
                const startYear = currentShowYear - 5;
                const endYear = currentShowYear + 5;
                for (let y = startYear; y <= endYear; y++) {
                    const item = document.createElement("div");
                    item.className = "panel-item" + (y === currentShowYear ? " active" : "");
                    item.textContent = y;
                    item.addEventListener("click", (e) => {
                        e.stopPropagation();
                        currentShowYear = y;
                        renderCalendar(currentShowYear, currentShowMonth);
                        closeAllPanel();
                    });
                    yearPanel.appendChild(item);
                }
            }

            // ============ 渲染月份选择面板 ============
            function renderMonthPanel() {
                monthPanel.innerHTML = "";
                for (let m = 1; m <= 12; m++) {
                    const item = document.createElement("div");
                    item.className = "panel-item" + (m === currentShowMonth ? " active" : "");
                    item.textContent = m + "月";
                    item.addEventListener("click", (e) => {
                        e.stopPropagation();
                        currentShowMonth = m;
                        renderCalendar(currentShowYear, currentShowMonth);
                        closeAllPanel();
                    });
                    monthPanel.appendChild(item);
                }
            }

            // ============ 关闭所有下拉面板 ============
            function closeAllPanel() {
                yearPanel.classList.remove("show");
                monthPanel.classList.remove("show");
            }

            // ============ 切换面板显示 ============
            function togglePanel(panelToShow, panelToHide, renderFn) {
                const isShowing = panelToShow.classList.contains("show");
                closeAllPanel();
                if (!isShowing) {
                    renderFn();
                    panelToShow.classList.add("show");
                }
            }

            // ============ 日历主渲染 ============
            function renderCalendar(year, month) {
                dayGrid.innerHTML = "";
                updateYMTitle();
                const yearHoliday = allYearHolidays[year] || {};

                const firstDay = new Date(year, month - 1, 1).getDay();
                const preDays = firstDay === 0 ? 6 : firstDay - 1;
                const thisMonthTotal = new Date(year, month, 0).getDate();
                const lastMonthTotal = new Date(year, month - 1, 0).getDate();

                // 填充上月末尾日期
                for (let i = 0; i < preDays; i++) {
                    const dayNum = lastMonthTotal - preDays + i + 1;
                    const cell = createDayCell(dayNum, "", "", true, false, false, false, false);
                    dayGrid.appendChild(cell);
                }

                // 填充本月日期
                for (let d = 1; d <= thisMonthTotal; d++) {
                    const dateKey = `${month}-${d}`;
                    const lunarTxt = getSimpleLunar(year, month, d);
                    const holidayName = yearHoliday[dateKey] || "";
                    const isHoliday = !!holidayName;
                    const isFestival = !!festivalMap[dateKey];
                    const isPeaceDay = peaceDays.includes(dateKey);
                    const isTodayFlag = (year === todayYear && month === todayMonth && d === todayDay);

                    const cell = createDayCell(d, holidayName, lunarTxt, false, isTodayFlag, isHoliday, isFestival,
                        isPeaceDay);
                    dayGrid.appendChild(cell);
                }

                // 填充下月开头日期（凑满42格）
                const totalCells = dayGrid.children.length;
                const fillNum = 42 - totalCells;
                for (let i = 1; i <= fillNum; i++) {
                    const cell = createDayCell(i, "", "", true, false, false, false, false);
                    dayGrid.appendChild(cell);
                }
            }

            // ============ 回到今天 ============
            function goToToday() {
                if (currentShowYear === todayYear && currentShowMonth === todayMonth) {
                    // 如果已经在今天，做一个微妙的"脉冲"提示
                    renderCalendar(currentShowYear, currentShowMonth);
                    return;
                }
                currentShowYear = todayYear;
                currentShowMonth = todayMonth;
                renderCalendar(currentShowYear, currentShowMonth);
                closeAllPanel();
            }

            // ============ 事件绑定 ============
            // 上一个月
            document.getElementById("prevMonth").addEventListener("click", () => {
                currentShowMonth--;
                if (currentShowMonth < 1) {
                    currentShowMonth = 12;
                    currentShowYear--;
                }
                renderCalendar(currentShowYear, currentShowMonth);
                closeAllPanel();
            });

            // 下一个月
            document.getElementById("nextMonth").addEventListener("click", () => {
                currentShowMonth++;
                if (currentShowMonth > 12) {
                    currentShowMonth = 1;
                    currentShowYear++;
                }
                renderCalendar(currentShowYear, currentShowMonth);
                closeAllPanel();
            });

            // 回到今天按钮
            btnToday.addEventListener("click", (e) => {
                e.stopPropagation();
                goToToday();
            });

            // 年份文字点击
            yearText.addEventListener("click", (e) => {
                e.stopPropagation();
                togglePanel(yearPanel, monthPanel, renderYearPanel);
            });

            // 月份文字点击
            monthText.addEventListener("click", (e) => {
                e.stopPropagation();
                togglePanel(monthPanel, yearPanel, renderMonthPanel);
            });

            // 面板容器阻止冒泡（防止点击面板空白处关闭）
            yearPanel.addEventListener("click", (e) => {
                e.stopPropagation();
            });
            monthPanel.addEventListener("click", (e) => {
                e.stopPropagation();
            });

            // 点击页面空白关闭面板
            document.body.addEventListener("click", (e) => {
                // 如果点击的是日历盒子外部，也关闭面板
                closeAllPanel();
            });

            // 日历盒子点击时阻止冒泡（保持面板打开如果点击在盒子内非面板区域）
            calendarBox.addEventListener("click", (e) => {
                // 如果面板已打开且点击在面板外（但在日历盒子内），关闭面板
                if (yearPanel.classList.contains("show") || monthPanel.classList.contains("show")) {
                    // 检查点击是否在面板内（面板内有自己的stopPropagation）
                    // 这里到达说明点击在日历盒子内但不在面板内
                    closeAllPanel();
                }
                e.stopPropagation();
            });

            // 键盘导航
            document.addEventListener("keydown", (e) => {
                // ESC关闭面板
                if (e.key === "Escape") {
                    closeAllPanel();
                    return;
                }
                // 左右箭头切换月份
                if (e.key === "ArrowLeft" && !e.target.closest("input, textarea, select")) {
                    e.preventDefault();
                    currentShowMonth--;
                    if (currentShowMonth < 1) {
                        currentShowMonth = 12;
                        currentShowYear--;
                    }
                    renderCalendar(currentShowYear, currentShowMonth);
                    closeAllPanel();
                }
                if (e.key === "ArrowRight" && !e.target.closest("input, textarea, select")) {
                    e.preventDefault();
                    currentShowMonth++;
                    if (currentShowMonth > 12) {
                        currentShowMonth = 1;
                        currentShowYear++;
                    }
                    renderCalendar(currentShowYear, currentShowMonth);
                    closeAllPanel();
                }
                // T键回到今天
                if (e.key === "t" && !e.target.closest("input, textarea, select") && !e.ctrlKey && !e.metaKey) {
                    e.preventDefault();
                    goToToday();
                }
            });

            // ============ 窗口尺寸变化时关闭面板 ============
            window.addEventListener("resize", () => {
                closeAllPanel();
            });

            // ============ 初始渲染 ============
            renderCalendar(currentShowYear, currentShowMonth);

            console.log("🕊 世界和平！日历已就绪");
            console.log("💡 提示：点击年份或月份可快速跳转 | 按 ← → 切换月份 | 按 T 回到今天 | 按 ESC 关闭面板");
        })();
