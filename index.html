<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>世界和平！</title>
 <link rel="shortcut icon" href="favicon.ico">
 <style>
 /* ===== CSS 变量系统 ===== */
 :root {
 --primary: #2478e0;
 --primary-light: #74b3ff;
 --holiday-red: #d82020;
 --festival-orange: #e66000;
 --solar-term-green: #3a8c5c;
 --solar-term-bg: #eafaf1;
 --workday-gray: #8c8c8c;
 --workday-bg: #f5f5f5;
 --saturday-blue: #2979c1;
 --sunday-red: #c62828;
 --card-bg: rgba(255, 255, 255, 0.94);
 --shadow-sm: 0 2px 12px rgba(36, 120, 224, 0.06);
 --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.10);
 --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.15);
 --shadow-glow: 0 8px 24px rgba(0, 0, 0, 0.10);
 --radius: 14px;
 --radius-sm: 8px;
 --transition-fast: 0.18s ease;
 --transition-smooth: 0.22s cubic-bezier(0.2, 0, 0.2, 1);
 --bg-overlay: rgba(255, 255, 255, 0.15);
 /* 主题色 */
 --theme-bg-1: #e0ecf8;
 --theme-bg-2: #f0e8f8;
 --theme-bg-3: #f8f4f0;
 --text-color: #1a1a1a;
 }

 /* ===== 夜间模式 ===== */
 body.dark-mode {
 --theme-bg-1: #1a1e2e;
 --theme-bg-2: #1d2235;
 --theme-bg-3: #1b1f30;
 --text-color: #d8dce8;
 --card-bg: rgba(30, 35, 55, 0.94);
 --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.40);
 --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.50);
 --primary: #5a9fff;
 --primary-light: #74b3ff;
 --solar-term-bg: rgba(58, 140, 92, 0.2);
 --workday-bg: rgba(80,80,80,0.3);
 }
 body.dark-mode .title-text {
 color: #d8dce8;
 text-shadow: 0 2px 12px rgba(0,0,0,0.5);
 }
 body.dark-mode .time-box { color: #c8cce0; text-shadow: 0 1px 6px rgba(0,0,0,0.4); }
 body.dark-mode .countdown-bar { background: linear-gradient(135deg, #2a2e40, #252838); border-color: #4a5070; color: #a0a8c8; }
 body.dark-mode .calendar-box { background: rgba(28, 33, 52, 0.94); }
 body.dark-mode .week-row { border-bottom-color: #333655; }
 body.dark-mode .week-item { color: #a0a8c8; }
 body.dark-mode .panel-item { background: #252838; color: #c8cce0; }
 body.dark-mode .panel-item:hover { background: linear-gradient(135deg, #2e3560, #263050); color: #94b8ff; }
 body.dark-mode .panel-item.active { background: linear-gradient(135deg, #5a9fff, #4090ff); }
 body.dark-mode .calendar-header button { background: #252838; border-color: #3a3f5c; color: #c8cce0; }
 body.dark-mode .calendar-header button:hover { background: #2e3560; border-color: #5a9fff; }
 body.dark-mode .modal-dialog { background: #1e2438; }
 body.dark-mode .modal-note-item { background: #252838; border-color: #333655; }
 body.dark-mode .modal-note-item:hover { background: #2a2f48; }
 body.dark-mode .modal-notes-list::-webkit-scrollbar-thumb { background: #3a4060; }
 body.dark-mode .modal-input-row input { background: #252838; border-color: #3a4060; color: #d8dce8; }
 body.dark-mode .btn-today { color: #5a9fff !important; border-color: #3a5070 !important; background: #1e2438 !important; }
 body.dark-mode .btn-today:hover { background: #252a40 !important; color: #74b3ff !important; }
 body.dark-mode .day-cell.other-month .lunar { color: #4a4f6a; }
 body.dark-mode .day-cell.other-month { color: #5a5f7a; }
 body.dark-mode .workday-makeup { background: rgba(80,80,80,0.2); }
 body.dark-mode .note-tooltip { background: #252838; border-color: #3a4060; }
 body.dark-mode .weather-card { background: rgba(28, 33, 52, 0.92); }
 body.dark-mode .weather-toggle-btn { background: rgba(28,33,52,0.88); border-color: rgba(90,159,255,0.3); color: #5a9fff; }
 body.dark-mode body::before { background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.1) 100%); }
 body.dark-mode .day-cell .lunar { color: #8a8eb0; }
 body.dark-mode .holiday-name { color: #ff7070; }
 body.dark-mode .solar-term-name { color: #6fbf9a; }
 body.dark-mode .year-click, body.dark-mode .month-click { color: #5a9fff; text-decoration-color: #3a6090; }
 body.dark-mode .btn-close-modal { background: #252838; border-color: #3a4060; color: #a0a8c8; }
 body.dark-mode .btn-add-note { background: #5a9fff; }
 body.dark-mode .btn-add-note:hover { background: #4090ff; }
 body.dark-mode .btn-del-note:hover { background: rgba(200,50,50,0.15) !important; }
 body.dark-mode .note-dot { background: #e05050; }
 body.dark-mode .btn-del-note { color: #a07070; }
 body.dark-mode .weather-search-bar input { background: rgba(28,33,52,0.9); border-color: #3a4060; color: #d8dce8; }
 body.dark-mode .weather-search-bar .btn-go { background: #5a9fff; border-color: #5a9fff; }
 body.dark-mode .btn-del-note { color: #a07070; }
 body.dark-mode .solar-term { background: rgba(58,140,92,0.15) !important; }
 body.dark-mode .day-cell.festival { background: rgba(230,96,0,0.1) !important; }
 body.dark-mode .day-cell.holiday { background: rgba(216,32,32,0.1) !important; }
 body.dark-mode .peace-day { background: rgba(36,120,224,0.08) !important; }
 body.dark-mode .day-cell.today { border-color: #5a9fff !important; background: rgba(36,120,224,0.05); }
 body.dark-mode .day-cell.today .num { color: #5a9fff !important; }
 body.dark-mode .weather-refresh-btn { color: #5a70a0; }
 body.dark-mode .weather-refresh-btn:hover { background: #252838; color: #5a9fff; }
 body.dark-mode .weather-card:hover { box-shadow: 0 6px 20px rgba(90,159,255,0.2); }
 body.dark-mode .weather-toggle-btn:hover { background: rgba(28,33,52,0.95); }
 body.dark-mode .modal-date-label { color: #888; }
 body.dark-mode .modal-empty { color: #555; }
 body.dark-mode .weather-detail { color: #8090b0; }
 body.dark-mode .weather-city { color: #8090b0; }
 body.dark-mode .holiday-name { color: #ff7070; }
 body.dark-mode .workday-tag { color: #8090b0; }
 body.dark-mode .festival-tip-box { background: rgba(28,33,52,0.95); border-color: #3a4060; }
 body.dark-mode .greeting-sub { color: #8090b0; }
 body.dark-mode .theme-toggle-btn { background: rgba(28,33,52,0.88); border-color: rgba(90,159,255,0.2); color: #8090b0; }
 body.dark-mode .theme-toggle-btn:hover { background: rgba(28,33,52,0.95); color: #d8dce8; }
 body.dark-mode .view-toggle-btn { background: rgba(28,33,52,0.88); border-color: rgba(90,159,255,0.2); color: #8090b0; }
 body.dark-mode .view-toggle-btn:hover { background: rgba(28,33,52,0.95); color: #d8dce8; }
 body.dark-mode .view-toggle-btn.active { background: rgba(90,159,255,0.2); border-color: #5a9fff; color: #5a9fff; }
 body.dark-mode .lang-toggle-btn { background: rgba(28,33,52,0.88); border-color: rgba(90,159,255,0.2); color: #8090b0; }
 body.dark-mode .lang-toggle-btn:hover { background: rgba(28,33,52,0.95); color: #d8dce8; }
 body.dark-mode .lang-toggle-btn.active { background: rgba(90,159,255,0.2); border-color: #5a9fff; color: #5a9fff; }
 body.dark-mode .dashboard-card { background: rgba(28,33,52,0.92); }
 body.dark-mode .dash-value { color: #d8dce8; }
 body.dark-mode .dash-label { color: #7a8098; }
 body.dark-mode .backup-btn { background: rgba(28,33,52,0.88); border-color: #3a4060; color: #8090b0; }
 body.dark-mode .backup-btn:hover { background: rgba(28,33,52,0.95); border-color: #5a9fff; }
 body.dark-mode .note-search-input { background: rgba(28,33,52,0.9); border-color: #3a4060; color: #d8dce8; }
 body.dark-mode .note-search-input::placeholder { color: #5a6080; }
 body.dark-mode .year-click:hover, body.dark-mode .month-click:hover { background: rgba(90,159,255,0.1); }
 body.dark-mode .weather-search-bar .btn-cancel-search { background: #252838; border-color: #3a4060; color: #8090b0; }
 body.dark-mode .weather-loading span { color: #5a6a8a; }

 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }

 body {
 background: linear-gradient(170deg, var(--theme-bg-1) 0%, var(--theme-bg-2) 40%, var(--theme-bg-3) 100%);
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 overflow-x: hidden;
 gap: 14px;
 padding: 16px 10px 24px;
 position: relative;
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
 transition: background 0.5s ease;
 }
 body::before {
 content: "";
 position: fixed;
 inset: 0;
 background: linear-gradient(180deg,
 rgba(255, 255, 255, 0.15) 0%,
 rgba(255, 255, 255, 0.28) 40%,
 rgba(255, 255, 255, 0.40) 100%);
 z-index: -1;
 pointer-events: none;
 transition: background 0.5s ease;
 }
 body.dark-mode::before {
 background: linear-gradient(180deg,
 rgba(0,0,0,0.05) 0%,
 rgba(0,0,0,0.1) 100%);
 }

 /* ===== 右上角工具栏 ===== */
 .topbar {
 position: fixed;
 top: 12px;
 right: 12px;
 z-index: 9998;
 display: flex;
 flex-direction: column;
 align-items: flex-end;
 gap: 6px;
 }

 /* ===== 工具按钮组 ===== */
 .toolbar-row {
 display: flex;
 gap: 5px;
 align-items: center;
 }
 .toolbar-btn {
 background: rgba(255, 255, 255, 0.88);
 backdrop-filter: blur(10px);
 -webkit-backdrop-filter: blur(10px);
 border: 1.5px solid rgba(36,120,224,0.18);
 border-radius: 20px;
 padding: 5px 12px;
 font-size: 12px;
 color: #2478e0;
 font-weight: 600;
 cursor: pointer;
 box-shadow: 0 2px 8px rgba(36,120,224,0.08);
 transition: all 0.2s;
 display: flex;
 align-items: center;
 gap: 5px;
 letter-spacing: 0.5px;
 white-space: nowrap;
 }
 .toolbar-btn:hover {
 background: rgba(255,255,255,0.95);
 box-shadow: 0 4px 12px rgba(36,120,224,0.16);
 transform: translateY(-1px);
 }
 .toolbar-btn:active { transform: scale(0.95); }
 .toolbar-btn.active {
 background: rgba(36,120,224,0.12);
 border-color: #2478e0;
 }

 .view-toggle-btn { font-size: 11px; padding: 5px 10px; }
 .lang-toggle-btn { font-size: 11px; padding: 5px 10px; }

 /* ===== 天气卡片 ===== */
 .weather-widget {
 display: flex;
 flex-direction: column;
 align-items: flex-end;
 gap: 5px;
 }
 .weather-card {
 background: rgba(255, 255, 255, 0.92);
 backdrop-filter: blur(10px);
 -webkit-backdrop-filter: blur(10px);
 border-radius: 12px;
 padding: 10px 14px;
 box-shadow: 0 4px 16px rgba(36, 120, 224, 0.12), 0 1px 4px rgba(0,0,0,0.08);
 cursor: default;
 user-select: none;
 min-width: 190px;
 opacity: 0;
 transform: translateY(-8px);
 transition: all 0.3s ease;
 pointer-events: none;
 }
 .weather-card.show {
 opacity: 1;
 transform: translateY(0);
 pointer-events: auto;
 }
 .weather-card:hover {
 box-shadow: 0 6px 20px rgba(36,120,224,0.18), 0 2px 6px rgba(0,0,0,0.10);
 transform: translateY(-1px);
 }
 .weather-main {
 display: flex;
 align-items: center;
 gap: 8px;
 }
 .weather-emoji { font-size: 28px; line-height: 1; flex-shrink: 0; }
 .weather-temp-block { display: flex; flex-direction: column; }
 .weather-city { font-size: 12px; color: #666; font-weight: 500; letter-spacing: 0.5px; white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
 .weather-temp { font-size: 20px; font-weight: 700; color: var(--text-color); line-height: 1.1; }
 .weather-detail { font-size: 11px; color: #888; margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
 .weather-detail span { white-space: nowrap; }
 .weather-forecast { margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; display: flex; gap: 8px; justify-content: space-around; font-size: 10px; color: #888; }
 .weather-forecast-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
 .weather-forecast-item .f-emoji { font-size: 16px; }
 .weather-forecast-item .f-day { color: #aaa; font-size: 9px; }
 .weather-loading { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #999; padding: 4px 0; }
 .weather-loading .spinner { width: 14px; height: 14px; border: 2px solid #d0d8e8; border-top-color: #2478e0; border-radius: 50%; animation: spin 0.8s linear infinite; }
 @keyframes spin { to { transform: rotate(360deg); } }
 .weather-error { font-size: 11px; color: #d82020; display: flex; align-items: center; gap: 4px; }
 .weather-refresh-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: #aaa; padding: 2px 4px; border-radius: 4px; transition: all 0.15s; line-height: 1; margin-top: 2px; display: block; }
 .weather-refresh-btn:hover { background: #f0f6ff; color: #2478e0; }
 .weather-toggle-btn { background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1.5px solid rgba(36,120,224,0.2); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: #2478e0; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(36,120,224,0.10); transition: all 0.2s; display: flex; align-items: center; gap: 5px; letter-spacing: 0.5px; }
 .weather-toggle-btn:hover { background: rgba(255,255,255,0.95); box-shadow: 0 4px 12px rgba(36,120,224,0.16); transform: translateY(-1px); }
 .weather-search-bar { display: flex; gap: 5px; align-items: center; opacity: 0; transform: translateY(-4px); transition: all 0.25s ease; pointer-events: none; height: 0; overflow: hidden; }
 .weather-search-bar.show { opacity: 1; transform: translateY(0); pointer-events: auto; height: auto; }
 .weather-search-bar input { border: 1px solid #ddd; border-radius: 6px; padding: 5px 9px; font-size: 12px; outline: none; font-family: inherit; width: 130px; transition: border 0.2s; background: rgba(255,255,255,0.9); }
 .weather-search-bar input:focus { border-color: #74b3ff; box-shadow: 0 0 0 2px rgba(36,120,224,0.08); }
 .weather-search-bar .btn-go, .weather-search-bar .btn-cancel-search { border: 1px solid #ddd; background: #fff; border-radius: 6px; padding: 5px 9px; font-size: 11px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
 .weather-search-bar .btn-go { background: #2478e0; color: #fff; border-color: #2478e0; }
 .weather-search-bar .btn-go:hover { background: #1a60c0; }
 .weather-search-bar .btn-cancel-search:hover { background: #f5f5f5; }

 /* ===== 标题区域 ===== */
 .title-wrap {
 opacity: 0;
 transform: scale(0.8);
 animation: textShow 2s ease-out forwards;
 position: relative;
 }
 .title-text {
 color: var(--text-color);
 font-weight: bold;
 font-size: clamp(2.2rem, 8vw, 5rem);
 line-height: 1.3;
 text-align: center;
 letter-spacing: 3px;
 text-shadow: 0 2px 12px rgba(255, 255, 255, 0.85);
 animation: gentleFloat 5s ease-in-out infinite alternate;
 transition: color 0.5s;
 }
 .peace-text { animation-delay: 0.6s; }
 @keyframes textShow { to { opacity: 1; transform: scale(1); } }
 @keyframes gentleFloat {
 from { transform: translateY(-3px) rotate(-0.3deg); }
 to { transform: translateY(3px) rotate(0.3deg); }
 }
 .greeting-sub {
 font-size: clamp(0.7rem, 2vw, 0.9rem);
 color: #888;
 text-align: center;
 margin-top: -6px;
 letter-spacing: 1px;
 animation: textShow 2.5s ease-out forwards;
 opacity: 0;
 animation-delay: 1.2s;
 transition: color 0.5s;
 }

 /* 飞鸽动画 */
 .dove-container {
 position: fixed;
 top: 0; left: 0; width: 100%; height: 100%;
 pointer-events: none;
 z-index: 0;
 overflow: hidden;
 }
 .dove {
 position: absolute;
 font-size: 16px;
 opacity: 0;
 animation: doveFly 18s linear infinite;
 }
 @keyframes doveFly {
 0% { opacity: 0; transform: translateX(-60px) translateY(0) rotate(-10deg); }
 5% { opacity: 0.4; }
 40% { opacity: 0.3; }
 95% { opacity: 0.2; }
 100% { opacity: 0; transform: translateX(calc(100vw + 60px)) translateY(-80px) rotate(10deg); }
 }

 /* ===== 倒计时提示栏 ===== */
 .countdown-bar {
 background: linear-gradient(135deg, #fff8e8, #fff3d6);
 border: 1.5px solid #f0c060;
 border-radius: 20px;
 padding: 7px 20px;
 font-size: clamp(0.82rem, 2vw, 0.96rem);
 color: #8b5e14;
 font-weight: 600;
 letter-spacing: 1px;
 text-align: center;
 box-shadow: 0 2px 10px rgba(180, 130, 40, 0.10);
 cursor: default;
 user-select: none;
 max-width: 90vw;
 transition: all 0.3s ease, background 0.5s, border-color 0.5s, color 0.5s;
 }
 .countdown-bar:hover {
 background: linear-gradient(135deg, #fff5d8, #ffedc4);
 box-shadow: 0 4px 16px rgba(180, 130, 40, 0.16);
 transform: translateY(-2px);
 }
 @keyframes countdownPulse {
 0%, 100% { box-shadow: 0 2px 10px rgba(180, 130, 40, 0.10); }
 50% { box-shadow: 0 2px 18px rgba(180, 130, 40, 0.22); }
 }
 body.dark-mode .countdown-bar { animation: countdownPulseDark 3s ease-in-out infinite; }
 @keyframes countdownPulseDark {
 0%, 100% { box-shadow: 0 2px 10px rgba(90,159,255,0.08); }
 50% { box-shadow: 0 2px 18px rgba(90,159,255,0.18); }
 }
 .countdown-icon { display: inline-block; animation: bounceIcon 0.6s ease-in-out infinite alternate; }
 @keyframes bounceIcon { from { transform: translateY(0); } to { transform: translateY(-4px); } }

 /* ===== 时钟 ===== */
 .time-box {
 font-size: clamp(0.88rem, 2.4vw, 1.2rem);
 color: var(--text-color);
 letter-spacing: 2px;
 text-shadow: 0 1px 6px rgba(255, 255, 255, 0.85);
 font-weight: 500;
 transition: all 0.3s ease, color 0.5s;
 cursor: default;
 }

 /* ===== 仪表盘概览 ===== */
 .dashboard-row {
 display: flex;
 gap: 8px;
 flex-wrap: wrap;
 justify-content: center;
 max-width: min(78vw, 460px);
 width: 100%;
 }
 .dashboard-card {
 background: var(--card-bg);
 backdrop-filter: blur(8px);
 -webkit-backdrop-filter: blur(8px);
 border-radius: 10px;
 padding: 8px 14px;
 box-shadow: var(--shadow-sm);
 flex: 1;
 min-width: 100px;
 text-align: center;
 transition: all 0.3s, background 0.5s;
 }
 .dash-value { font-size: 15px; font-weight: 700; color: var(--text-color); }
 .dash-label { font-size: 10px; color: #888; letter-spacing: 0.5px; margin-top: 1px; }
 .dash-icon { font-size: 16px; }

 /* ===== 节日温馨提示 ===== */
 .festival-tip-box {
 position: fixed;
 bottom: 20px;
 left: 50%;
 transform: translateX(-50%) translateY(120%);
 background: rgba(255, 248, 230, 0.97);
 border: 1.5px solid #f0c060;
 border-radius: 12px;
 padding: 12px 18px;
 max-width: min(88vw, 380px);
 width: auto;
 box-shadow: 0 6px 24px rgba(180,130,40,0.15);
 z-index: 9997;
 transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
 cursor: default;
 }
 .festival-tip-box.show { transform: translateX(-50%) translateY(0); }
 .festival-tip-box .tip-title { font-size: 13px; font-weight: 700; color: #8b5e14; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
 .festival-tip-box .tip-body { font-size: 12px; color: #666; line-height: 1.5; }
 .festival-tip-close { background: none; border: none; cursor: pointer; color: #c8a870; font-size: 14px; padding: 0 4px; float: right; }
 .festival-tip-close:hover { color: #8b5e14; }

 /* ===== 日历卡片 ===== */
 .calendar-box {
 width: min(78vw, 450px);
 background: var(--card-bg);
 border-radius: var(--radius);
 padding: 16px 14px 14px;
 box-shadow: var(--shadow-md);
 transition: all 0.3s ease, background 0.5s;
 position: relative;
 z-index: 1;
 backdrop-filter: blur(8px);
 -webkit-backdrop-filter: blur(8px);
 }
 .calendar-box:hover { box-shadow: var(--shadow-lg); }
 @media (max-width: 420px) {
 .calendar-box { width: 95vw; padding: 12px 8px 10px; border-radius: 12px; }
 }

 /* ===== 日历头部 ===== */
 .calendar-header {
 display: flex;
 align-items: center;
 justify-content: space-between;
 margin-bottom: 10px;
 gap: 4px;
 flex-wrap: nowrap;
 }
 .calendar-header button {
 border: 1px solid #ddd;
 background: #fff;
 padding: 5px 11px;
 border-radius: 6px;
 cursor: pointer;
 font-size: 14px;
 transition: all var(--transition-fast);
 white-space: nowrap;
 user-select: none;
 -webkit-tap-highlight-color: transparent;
 flex-shrink: 0;
 }
 .calendar-header button:hover { background-color: #f0f6ff; border-color: #94bfff; }
 .calendar-header button:active { transform: scale(0.92); }
 .btn-today {
 font-weight: 500;
 color: var(--primary);
 border-color: #c8ddfb !important;
 background: #fafcff !important;
 letter-spacing: 1px;
 font-size: 13px !important;
 padding: 5px 10px !important;
 }
 .btn-today:hover { background: #e8f0ff !important; border-color: var(--primary-light) !important; color: #1860c7 !important; }
 .ym-text {
 font-size: 17px;
 font-weight: bold;
 position: relative;

// ===== 记事管理 =====
const NOTES_KEY = 'calendar_peace_notes';
function loadAllNotes() { try { const r = localStorage.getItem(NOTES_KEY); return r ? JSON.parse(r) : {}; } catch(e) { return {}; } }
function saveAllNotes(notes) { try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch(e) {} }
function getNotesForDate(dateKey) { return loadAllNotes()[dateKey] || []; }
function addNoteToDate(dateKey, text) {
 const all = loadAllNotes();
 if (!all[dateKey]) all[dateKey] = [];
 all[dateKey].push({ id: Date.now(), text: text.trim(), createdAt: new Date().toISOString() });
 saveAllNotes(all);
 return all[dateKey];
}
function updateNoteInDate(dateKey, noteId, newText) {
 const all = loadAllNotes();
 if (!all[dateKey]) return;
 const note = all[dateKey].find(n => n.id === noteId);
 if (note) { note.text = newText.trim(); note.updatedAt = new Date().toISOString(); }
 saveAllNotes(all);
}
function deleteNoteFromDate(dateKey, noteId) {
 const all = loadAllNotes();
 if (!all[dateKey]) return;
 all[dateKey] = all[dateKey].filter(n => n.id !== noteId);
 if (all[dateKey].length === 0) delete all[dateKey];
 saveAllNotes(all);
}
function searchNotes(keyword) {
 if (!keyword.trim()) return [];
 const kw = keyword.toLowerCase();
 const all = loadAllNotes();
 const results = [];

 if (isSolarTerm && solarTermName && !isOtherMonth) inner += `<span class="solar-term-name">${solarTermName}</span>`;
 if (isHoliday && holidayName && !isOtherMonth) inner += `<span class="holiday-name">${holidayName}</span>`;
 if (isWorkday && !isOtherMonth && !isHoliday) inner += `<span class="workday-tag">${currentLang==='zh'?'补班':'Work'}</span>`;

// ===== 节日倒计时 ===== (节流版)
let lastCountdownMinute = -1;
function updateCountdown() {
 const now = new Date();
 const minute = now.getMinutes();
 if (minute === lastCountdownMinute) return; // 节流：同分钟不重复更新
 lastCountdownMinute = minute;

 const nowTime = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
 const allHolidayDates = [];
 for (const [yearStr, holidays] of Object.entries(allYearHolidays)) {
 const year = parseInt(yearStr);
 const seen = new Set();
 for (const [md, name] of Object.entries(holidays)) {
 if (seen.has(name)) continue; seen.add(name);
 const [m,d] = md.split('-').map(Number);
 const dateObj = new Date(year, m-1, d);
 if (dateObj.getTime() >= nowTime) allHolidayDates.push({ dateObj, name, year, month: m, day: d });
 }
 }
 allHolidayDates.sort((a,b) => a.dateObj - b.dateObj);
 const next = allHolidayDates[0];
 if (!next) { countdownText.innerHTML = currentLang==='zh' ? '🌟 所有节日已过，期待新的一年~' : "🌟 All holidays passed, look forward to the new year~"; return; }
 const diffDays = Math.ceil((next.dateObj.getTime() - nowTime) / 86400000);
 let emoji = '🎉';
 const emap = {'春节':'🧧','中秋':'🌕','国庆':'🇨🇳','端午':'🐲','清明':'🌿','劳动节':'💪','元旦':'🎊','元宵节':'🏮'};
 if (emap[next.name]) emoji = emap[next.name];
 if (diffDays === 0) countdownText.innerHTML = `${currentLang==='zh'?'今天是':'Today is'} <strong>${next.name}</strong> ${emoji} ${currentLang==='zh'?'节日快乐！':'Happy holiday!'}`;
 else countdownText.innerHTML = `${currentLang==='zh'?'距离':'Until'} <strong>${next.year}${currentLang==='zh'?'年':'/'}${next.month}${currentLang==='zh'?'月':'/'}${next.day} ${next.name}</strong> ${currentLang==='zh'?'还有':'in'} <strong>${diffDays}</strong> ${currentLang==='zh'?'天':'days'} ${emoji}`;
}

 $('btnWeatherCancel').textContent = currentLang==='zh'?'取消':'Cancel';
 const toggleBtn = $('weatherToggleBtn');
 toggleBtn.innerHTML = '📍 ' + (currentLang==='zh'?'天气加载中':'Loading...');
 checkFestivalTip();
}
$('langToggleBtn').addEventListener('click', () => {
 applyLang(currentLang === 'zh' ? 'en' : 'zh');
});
$('viewMonthBtn').addEventListener('click', () => {
 $('viewMonthBtn').classList.add('active'); $('viewWeekBtn').classList.remove('active');
 renderWeekRow(); renderCalendar();
});
$('viewWeekBtn').addEventListener('click', () => {
 // 周视图：显示本周7天日历
 $('viewWeekBtn').classList.add('active'); $('viewMonthBtn').classList.remove('active');
 const now = new Date();
 const dayOfWeek = now.getDay();
 const monday = new Date(now); monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
 dayGrid.innerHTML = '';
 for (let i = 0; i < 7; i++) {
 const dd = new Date(monday); dd.setDate(monday.getDate() + i);
 const y = dd.getFullYear(), m = dd.getMonth()+1, d = dd.getDate();
 const dateKey = `${m}-${d}`;
 const fullDateKey = `${y}-${m}-${d}`;
 const weekDay = dd.getDay();
 const lunarTxt = getSimpleLunar(y, m, d);
 const holidayName = (allYearHolidays[y] || {})[dateKey] || '';
 const isHoliday = !!holidayName;
 const solarTermName = (solarTermsData[y] || {})[dateKey] || '';
 const isSolarTerm = !!solarTermName;
 const isFestival = !!festivalMap[dateKey] && !isSolarTerm;
 const isPeaceDay = peaceDays.includes(dateKey);
 const isTodayFlag = (y === todayYear && m === todayMonth && d === todayDay);
 const isWorkday = !!(allYearWorkdays[y] && allYearWorkdays[y][dateKey]) && !isHoliday;
 const cell = createDayCell(d, holidayName, lunarTxt, false, isTodayFlag, isHoliday, isFestival, isSolarTerm, solarTermName, isWorkday, isPeaceDay, weekDay, fullDateKey);
 dayGrid.appendChild(cell);
 }
 bindDayCellEvents();
});

// ===== 事件绑定 =====
$('prevMonth').addEventListener('click', () => switchMonth('prev', null, null, 'right'));
$('nextMonth').addEventListener('click', () => switchMonth('next', null, null, 'left'));
btnToday.addEventListener('click', e => {
 e.stopPropagation();
 if (currentShowYear === todayYear && currentShowMonth === todayMonth) { renderCalendar(); updateCountdown(); updateDashboard(); return; }
 currentShowYear = todayYear; currentShowMonth = todayMonth;
 switchMonth('none', null, null, 'none');
 $('viewMonthBtn').click();
 closeAllPanel();
});
yearText.addEventListener('click', e => { e.stopPropagation(); togglePanel(yearPanel, monthPanel, renderYearPanel); });
monthText.addEventListener('click', e => { e.stopPropagation(); togglePanel(monthPanel, yearPanel, renderMonthPanel); });
yearPanel.addEventListener('click', e => e.stopPropagation());
monthPanel.addEventListener('click', e => e.stopPropagation());
document.body.addEventListener('click', () => closeAllPanel());

// 滚轮
calendarBox.addEventListener('wheel', e => {
 if (modalOverlay.classList.contains('show') || yearPanel.classList.contains('show') || monthPanel.classList.contains('show')) return;
 e.preventDefault();
 if (e.deltaY > 0) switchMonth('next', null, null, 'left');
 else switchMonth('prev', null, null, 'right');
}, { passive: false });

// 触摸滑动
let touchStartX = 0;
calendarBox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
calendarBox.addEventListener('touchend', e => {
 const dx = e.changedTouches[0].clientX - touchStartX;
 if (Math.abs(dx) > 60) {
 if (dx < 0) switchMonth('next', null, null, 'left');
 else switchMonth('prev', null, null, 'right');
 }
});

// 键盘
document.addEventListener('keydown', e => {
 if (e.key === 'Escape') { closeAllPanel(); closeNoteModal(); return; }
 if (modalOverlay.classList.contains('show')) {
 if (e.key === 'Enter' && document.activeElement === modalNoteInput) { e.preventDefault(); addNoteHandler(); }
 return;
 }
 if (e.key === 'ArrowLeft' && !e.target.closest('input,textarea,select')) { e.preventDefault(); switchMonth('prev', null, null, 'right'); }
 if (e.key === 'ArrowRight' && !e.target.closest('input,textarea,select')) { e.preventDefault(); switchMonth('next', null, null, 'left'); }
 if ((e.key === 't' || e.key === 'T') && !e.target.closest('input,textarea,select') && !e.ctrlKey && !e.metaKey) { e.preventDefault(); btnToday.click(); }
});

// 弹窗
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeNoteModal(); });
btnCloseModal.addEventListener('click', closeNoteModal);
btnAddNote.addEventListener('click', addNoteHandler);
modalDialog.addEventListener('click', e => e.stopPropagation());
$('btnShowSearch').addEventListener('click', toggleSearchMode);
$('btnSearchNotes').addEventListener('click', doSearch);
$('noteSearchInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doSearch(); } if (e.key === 'Escape') { hideSearchResults(); } });
$('btnExportNotes').addEventListener('click', exportNotes);
$('btnImportNotes').addEventListener('click', () => $('importFileInput').click());
$('importFileInput').addEventListener('change', e => { if (e.target.files[0]) importNotes(e.target.files[0]); e.target.value = ''; });
window.addEventListener('resize', () => closeAllPanel());

// ===== 天气模块 =====
const weatherCard = $('weatherCard');
const weatherContent = $('weatherContent');
const weatherToggleBtn = $('weatherToggleBtn');
const weatherRefreshBtn = $('weatherRefreshBtn');
const weatherSearchBar = $('weatherSearchBar');
const weatherCityInput = $('weatherCityInput');
const btnWeatherGo = $('btnWeatherGo');
const btnWeatherCancel = $('btnWeatherCancel');
const WEATHER_CITY_KEY = 'weather_city';
const WEATHER_REFRESH_KEY = 'weather_refresh';
let weatherTimer = null;
let currentCity = null;

function weatherEmoji(code, isDay) {
 const c = code || '';
 const m = {
 'Sunny': isDay ? '☀️' : '🌙', 'Clear': isDay ? '☀️' : '🌙',
 'Partly cloudy': isDay ? '⛅' : '☁️', 'Cloudy': '☁️', 'Overcast': '☁️',
 'Mist': '🌫️', 'Fog': '🌫️', 'Light drizzle': '🌦️', 'Drizzle': '🌧️',
 'Light rain': '🌧️', 'Moderate rain': '🌧️', 'Heavy rain': '🌧️',
 'Light snow': '🌨️', 'Snow': '❄️', 'Heavy snow': '❄️',
 'Thunderstorm': '⛈️', 'Light shower': '🌦️', 'Shower': '🌧️',
 'Light Rain': '🌧️', 'Moderate Rain': '🌧️', 'Heavy Rain': '🌧️',
 };
 if (m[c]) return m[c];
 if (c.toLowerCase().includes('rain') || c.toLowerCase().includes('drizzle')) return '🌧️';
 if (c.toLowerCase().includes('snow')) return '❄️';
 if (c.toLowerCase().includes('thunder')) return '⛈️';
 if (c.toLowerCase().includes('fog') || c.toLowerCase().includes('mist')) return '🌫️';
 if (c.toLowerCase().includes('cloud')) return '☁️';
 if (c.toLowerCase().includes('sunny') || c.toLowerCase().includes('clear')) return isDay ? '☀️' : '🌙';
 return '🌡️';
}

function renderWeatherCard(city, temp, feelsLike, humidity, wind, condition, isDay, forecast) {
 const emoji = weatherEmoji(condition, isDay);
 let html = `
 <div class="weather-main">
 <span class="weather-emoji">${emoji}</span>
 <div class="weather-temp-block">
 <div class="weather-city" title="${city}">${city}</div>
 <div class="weather-temp">${temp}</div>
 </div>
 </div>
 <div class="weather-detail">
 <span>${currentLang==='zh'?'体感':'Feels'} ${feelsLike}</span>
 <span>💧 ${humidity}</span>
 <span>💨 ${wind}</span>
 </div>`;
 if (forecast && forecast.length) {
 html += `<div class="weather-forecast">`;
 forecast.forEach(f => {
 const dayName = currentLang==='zh'
 ? ['','','','','','','六','日','','一','二','三','四','五'][new Date(f.date + 'T12:00:00').getDay()] || f.date.slice(-2)+'日'
 : ['','','','','','','Sat','Sun','','Mon','Tue','Wed','Thu','Fri'][new Date(f.date + 'T12:00:00').getDay()] || f.date.slice(-2);
 html += `<div class="weather-forecast-item"><span class="f-day">${dayName}</span><span class="f-emoji">${weatherEmoji(f.desc, true)}</span><span>${f.max}°</span></div>`;
 });
 html += `</div>`;
 }
 weatherContent.innerHTML = html;
 const btnText = `${emoji} ${temp}`;
 weatherToggleBtn.innerHTML = '📍 ' + btnText;
 weatherToggleBtn.setAttribute('aria-label', `${city} ${temp} ${condition}`);
}

function showWeatherLoading() {
 weatherContent.innerHTML = `<div class="weather-loading"><div class="spinner"></div><span>${currentLang==='zh'?'正在获取天气...':'Loading weather...'}</span></div>`;
 weatherToggleBtn.innerHTML = '📍 ' + (currentLang==='zh'?'加载中':'Loading...');
}
function showWeatherError(msg) {
 weatherContent.innerHTML = `<div class="weather-error"><span>⚠️</span><span>${msg}</span></div>`;
 weatherToggleBtn.innerHTML = '📍 ' + (currentLang==='zh'?'获取失败':'Error');
}

async function fetchWeather(city) {
 showWeatherLoading();
 try {
 const encodedCity = encodeURIComponent(city || '');
 const url = city ? `https://wttr.in/${encodedCity}?format=j1` : `https://wttr.in/?format=j1`;
 const resp = await fetch(url);
 if (!resp.ok) throw new Error('network');
 const data = await resp.json();
 const current = data.current_condition && data.current_condition[0];
 if (!current) throw new Error('no data');
 const temp = current.temp_C + '°C';
 const feelsLike = current.FeelsLikeC + '°C';
 const humidity = current.humidity + '%';
 const wind = current.windspeedKmph + ' km/h';
 const condition = current.weatherDesc && current.weatherDesc[0] && current.weatherDesc[0].value || '';
 const obsTime = current.observation_time ? parseInt(current.observation_time) : 12;
 const isDay = obsTime >= 6 && obsTime < 20;
 // 城市名
 const nearestArea = data.nearest_area && data.nearest_area[0];
 let cityName = city || (currentLang==='zh'?'当前位置':'Current location');
 if (nearestArea && nearestArea.areaName) cityName = nearestArea.areaName[0].value || cityName;

 // 3天预报
 const forecast = [];
 if (data.weather && data.weather.length >= 3) {
 for (let fi = 1; fi <= 2; fi++) {
 const w = data.weather[fi];
 if (w) {
 const desc = w.hourly && w.hourly[4] && w.hourly[4].weatherDesc && w.hourly[4].weatherDesc[0] && w.hourly[4].weatherDesc[0].value || '';
 const maxC = w.maxtempC || '';
 forecast.push({ date: w.date, max: maxC, desc });
 }
 }
 }
 renderWeatherCard(cityName, temp, feelsLike, humidity, wind, condition, isDay, forecast);
 weatherCard.classList.add('show');
 } catch(err) {
 console.warn('Weather fetch failed:', err);
 showWeatherError(currentLang==='zh'?'获取失败，点击重试':'Failed, tap to retry');
 weatherCard.classList.add('show');
 }
}

function toggleWeatherCard() {
 if (weatherSearchBar.classList.contains('show')) { weatherSearchBar.classList.remove('show'); return; }
 weatherCard.classList.toggle('show');
}
function showWeatherSearch() { weatherSearchBar.classList.add('show'); weatherCityInput.value = ''; setTimeout(() => weatherCityInput.focus(), 50); }
function hideWeatherSearch() { weatherSearchBar.classList.remove('show'); weatherCityInput.value = ''; }
function submitWeatherCity() {
 let city = weatherCityInput.value.trim();
 if (!city) return;
 try { localStorage.setItem(WEATHER_CITY_KEY, city); } catch(e) {}
 currentCity = city;
 fetchWeather(city);
 hideWeatherSearch();
}
weatherToggleBtn.addEventListener('click', e => { e.stopPropagation(); toggleWeatherCard(); });
weatherRefreshBtn.addEventListener('click', e => { e.stopPropagation(); fetchWeather(currentCity); });
btnWeatherGo.addEventListener('click', e => { e.stopPropagation(); submitWeatherCity(); });
btnWeatherCancel.addEventListener('click', e => { e.stopPropagation(); hideWeatherSearch(); });
weatherCityInput.addEventListener('keydown', e => {
 if (e.key === 'Enter') { e.preventDefault(); submitWeatherCity(); }
 if (e.key === 'Escape') { e.stopPropagation(); hideWeatherSearch(); }
});
// 长按切换城市搜索
let pressTimer = null;
weatherToggleBtn.addEventListener('touchstart', () => { pressTimer = setTimeout(() => { showWeatherSearch(); }, 600); });
weatherToggleBtn.addEventListener('touchend', () => clearTimeout(pressTimer));
weatherToggleBtn.addEventListener('mousedown', () => { pressTimer = setTimeout(() => { showWeatherSearch(); }, 600); });
weatherToggleBtn.addEventListener('mouseup', () => clearTimeout(pressTimer));

function initWeather() {
 let savedCity = null, refreshInterval = 30;
 try {
 savedCity = localStorage.getItem(WEATHER_CITY_KEY);
 refreshInterval = parseInt(localStorage.getItem(WEATHER_REFRESH_KEY) || '30');
 } catch(e) {}
 currentCity = savedCity || null;
 fetchWeather(currentCity);
 if (weatherTimer) clearInterval(weatherTimer);
 const ms = Math.max(5, Math.min(refreshInterval, 120)) * 60 * 1000;
 weatherTimer = setInterval(() => fetchWeather(currentCity), ms);
}

// ===== 初始化 =====
function init() {
 // 恢复主题
 try {
 const savedTheme = localStorage.getItem('cal_theme');
 applyTheme(savedTheme === 'dark');
 } catch(e) {}
 // 恢复语言
 try {
 const savedLang = localStorage.getItem('cal_lang');
 if (savedLang) { currentLang = savedLang; applyLang(savedLang); }
 } catch(e) {}
 renderWeekRow();
 renderCalendar();
 updateCountdown();
 updateDashboard();
 updateGreeting();
 spawnDoves();
 initWeather();
 setInterval(updateTime, 1000);
 setInterval(updateCountdown, 60000);
 checkFestivalTip();
 console.log('🕊 世界和平！日历 v2.0 已就绪 | Ctrl+D 收藏~');
 console.log('💡 快捷键: ←→切换月份 | T回到今天 | ESC关闭弹窗 | 月份年份点击可跳转 | 长按天气按钮搜索城市');
}
init();

})();
</script>
